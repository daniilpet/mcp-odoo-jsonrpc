name: Version Bump

on:
  push:
    branches:
      - "release/**"

permissions:
  contents: write

jobs:
  bump:
    name: Bump version in pyproject.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check current version
        id: current
        run: |
          CURRENT=$(grep -oP 'version\s*=\s*"\K[^"]+' pyproject.toml)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT"

      - name: Update version if changed
        if: steps.current.outputs.current != steps.version.outputs.version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml to version $VERSION"

      - name: Commit version bump
        if: steps.current.outputs.current != steps.version.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(version): bump to ${{ steps.version.outputs.version }}"
          git push
